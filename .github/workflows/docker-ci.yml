name: Docker CI

on:
  push:
    branches:
      - main

  pull_request:

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
            
      - name: Build frontend image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/todo-frontend:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/todo-frontend:${{ github.sha }} \
            ./frontend    

      - name: Build backend image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/todo-backend:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/todo-backend:${{ github.sha }} \
            ./backend

      - name: Push frontend latest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/todo-frontend:latest

      
      - name: Push frontend SHA tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/todo-frontend:${{ github.sha }}
      
      - name: Push backend latest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/todo-backend:latest

      - name: Push backend SHA tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/todo-backend:${{ github.sha }}
